#Minimum PMWeather wind-vector magnitude before effects are applied. PMWeather's own units are used.
# Default: 8.0
# Range: 0.0 ~ 300.0
windThreshold = 35.0
#Inject PMWeather wind into Sable lift/drag calculations so wings see relative airflow.
enableAirflowLift = true
#How much PMWeather wind is treated as aerodynamic airflow for Sable lift providers. 1.0 = full sampled wind.
# Default: 1.0
# Range: 0.0 ~ 40.0
airflowInfluence = 1.0
#Also push the whole Sable sub-level center of mass. Disable for pure lift/drag integration.
enableBodyPush = true
#Whole-body wind push multiplier. PMWeather 0.16 tornado wind commonly reaches roughly 30-80+ in its own vector units. 5.0 is the gameplay-calibrated default for Sable bodies.
# Default: 5.0
# Range: 0.0 ~ 100.0
windInfluence = 0.025
#Optional extra mass damping for body wind. 0.0 = no extra damping, 1.0 = strongest damping. Sable physics already handles real mass.
# Default: 0.0
# Range: 0.0 ~ 1.0
massScaling = 0.65
#Safety cap on the linear impulse applied to a sub-level during each Sable physics substep.
# Default: 1500.0
# Range: 0.0 ~ 100000.0
maxImpulsePerSubstep = 60.0
#Deprecated in 0.2.8. Raw multi-point PMWeather wind is used instead; no random turbulence torque is applied.
# Default: 0.0
# Range: 0.0 ~ 10.0
turbulenceMultiplier = 0.008
#Allow ProtoManly's Weather tornado/suction effects in the sampled wind vector.
enableTornadoSuction = true
#Log sampled wind and impulses occasionally. Very noisy when enabled.
debugLogging = false
#How much tangential wind sliding along a sampled face contributes to off-center body force. 0.0 = pressure/normal component only, 1.0 = full tangential shear. Lower values reduce unrealistic tornado self-spin while still using raw PMWeather wind samples.
# Default: 0.006
# Range: 0.0 ~ 1.0
surfaceShearFactor = 0.006
#Deprecated in 0.3.9. The old wind-gradient surface torque path is disabled so rotation comes from aerodynamicProfileStrength and the cached exposed-surface profile instead.
# Default: 0.0
# Range: 0.0 ~ 5.0
surfaceTorqueFactor = 0.0
#Strength of cached multi-point exterior aerodynamic profile pressure. In 0.4.4 this is the main body wind force path, not just extra torque. 1.0 = full profile pressure using windInfluence.
# Default: 1.0
# Range: 0.0 ~ 5.0
aerodynamicProfileStrength = 1.0
#Maximum voxel-grid resolution used to estimate each Sable creation's exterior aerodynamic profile. Higher values make the cached profile more detailed, but do not increase per-tick wind samples unless maxSurfaceWindSamples is also raised.
# Default: 9
# Range: 3 ~ 32
aerodynamicProfileResolution = 9
#Inertia proxy where aerodynamic profile torque reaches full strength. Actual scale uses mass * leverArm^2. Higher values protect small/light creations from violent self-spin while leaving large creations mostly unchanged.
# Default: 1024.0
# Range: 1.0 ~ 1000000.0
aerodynamicProfileFullTorqueInertia = 1024.0
#Minimum torque scale for very small aerodynamic profiles. 0.0 can make tiny objects never rotate from profile pressure; higher values allow more small-object tumble.
# Default: 0.0
# Range: 0.0 ~ 1.0
aerodynamicProfileMinTorqueScale = 0.0
#Safety cap on angular impulse proxy produced by aerodynamic profile pressure per Sable physics substep. This prevents tiny low-inertia objects from spinning violently or disappearing.
# Default: 75.0
# Range: 0.0 ~ 100000.0
aerodynamicProfileMaxTorqueImpulse = 75.0
#Hard cutoff for profile-based torque. If mass * leverArm^2 is below this, aerodynamic profile pressure is applied at the center only, preventing tiny debris from exploding into axis-spin.
# Default: 128.0
# Range: 0.0 ~ 1000000.0
aerodynamicProfileMinTorqueInertia = 128.0
#Deprecated in 0.3.9 with the old wind-gradient surface torque path disabled. Kept only so older configs do not break.
# Default: 0.25
# Range: 0.0 ~ 2.0
surfaceDifferentialThresholdRatio = 0.25
#How strongly larger bounding-box faces receive more off-center surface force. 0.0 = all sampled faces equal, 1.0 = full normalized face-area weighting. This improves long/wide structure behavior without adding more wind samples.
# Default: 0.65
# Range: 0.0 ~ 1.0
surfaceAreaWeightStrength = 0.65
#Add a Sable-specific tornado updraft model on top of PMWeather's raw horizontal tornado wind. PMWeather 0.16's WindEngine usually returns little/no Y wind for normal supercell tornadoes, so enable this for realistic debris lift.
enableTornadoUpdraftModel = true
#Horizontal PMWeather wind speed where the Sable-specific tornado updraft starts. Set above normal storm winds so regular weather remains mostly horizontal.
# Default: 35.0
# Range: 0.0 ~ 300.0
tornadoUpdraftThreshold = 35.0
#How much upward wind is added from tornado-strength horizontal PMWeather wind. Updraft = (horizontalSpeed - threshold) * this value, capped by maxTornadoUpdraft.
# Default: 0.35
# Range: 0.0 ~ 5.0
tornadoUpdraftStrength = 0.35
#Maximum added upward wind from the Sable-specific tornado updraft model, in PMWeather wind-vector units.
# Default: 30.0
# Range: 0.0 ~ 300.0
maxTornadoUpdraft = 30.0
#Approximate vertical distance in blocks over which tornado updraft remains strong after an object first enters tornado-strength wind. Above this per-object lift zone, updraft fades out instead of carrying objects upward forever.
# Default: 28.0
# Range: 0.0 ~ 256.0
tornadoUpdraftLiftHeight = 28.0
#Per-object variation in tornado lift height, in blocks. This keeps different structures from orbiting at the exact same altitude while remaining smooth/stable instead of random jitter.
# Default: 16.0
# Range: 0.0 ~ 256.0
tornadoUpdraftHeightNoise = 16.0
#Fraction of the per-object lift height where updraft starts fading out. 0.65 means lift is mostly full for the lower 65%, then smoothly drops to zero near the object's lift ceiling.
# Default: 0.65
# Range: 0.0 ~ 1.0
tornadoUpdraftFadeStartRatio = 0.65
#Low-frequency coherent gust strength added during tornado-strength wind, as a fraction of horizontal PMWeather wind speed. This is smooth noise, not per-tick random jitter.
# Default: 0.12
# Range: 0.0 ~ 1.0
tornadoGustStrength = 0.12
#Vertical part of the coherent tornado gust noise, as a fraction of the computed updraft. Lower values avoid bouncy motion.
# Default: 0.12
# Range: 0.0 ~ 1.0
tornadoVerticalGustStrength = 0.12
#How slowly tornado gust noise changes over time. Higher = smoother/slower gusts. This does not increase PMWeather query cost.
# Default: 45
# Range: 1 ~ 1200
tornadoGustScaleTicks = 45
#Spatial scale for coherent tornado gust noise in blocks. Higher = nearby sample points get more similar gusts, reducing jitter on small structures.
# Default: 32.0
# Range: 1.0 ~ 512.0
tornadoGustSpatialScale = 32.0
#How often each Sable sub-level asks PMWeather for body-push wind samples, in game ticks. Cached raw wind is reused between samples and Sable physics substeps. 1 = every tick, 5 = four times per second.
# Default: 5
# Range: 1 ~ 200
bodyWindSampleIntervalTicks = 5
#How often each Sable sub-level asks PMWeather for airflow/lift wind, in game ticks. Large wing-heavy structures should keep this above 5 to avoid per-block wind sampling cost.
# Default: 10
# Range: 1 ~ 200
airflowWindSampleIntervalTicks = 10
#Maximum number of exterior aerodynamic profile wind samples per Sable sub-level, not counting the center fallback. 0 = center fallback only. 12 = balanced default. Higher values use more of the cached aero profile but spend more PMWeather wind samples.
# Default: 12
# Range: 0 ~ 64
maxSurfaceWindSamples = 12
#Global safety budget for PMWeather wind queries per server tick. When many large structures exist, cached/stale raw wind is reused after this budget is hit instead of tanking TPS.
# Default: 128
# Range: 16 ~ 100000
maxWindSamplesPerTick = 128
#Sample PMWeather wind around the sub-level roof and edges. Helps enclosed or large contraptions catch wind without needing roof holes.
enableEdgeWindSampling = true
#Distance outside the sub-level bounding box used for roof and edge wind samples.
# Default: 2.0
# Range: 0.0 ~ 64.0
edgeWindSampleMargin = 2.0
