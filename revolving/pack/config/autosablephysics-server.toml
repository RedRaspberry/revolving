#开关设置：适合游戏内配置界面第一页展示。
#Switches: intended for the first in-game config page.
[switches]
	#总开关。关闭后不会自动把方块组装成 Sable sub-level。
	#Master switch. Disable to stop automatic Sable assembly.
	enabled = true
	#仅物理化砍树模式。开启后只响应树干、树叶、藤蔓、可可豆等树相关变化；普通建筑、地形和非树方块不会被自动扫描或物理化。
	#Tree-only mode. Only tree trunks/leaves/vines/cocoa-like tree changes are scanned; ordinary terrain and structures are ignored.
	onlyTreePhysicsMode = false
	#放置方块后也扫描附近结构。默认关闭以减少误触发。
	#Also scan after block placement. Off by default to reduce false triggers.
	triggerOnPlace = false
	#放置方块后若发现单个小物体悬空，允许触发极小预算复查。
	#Allow tiny small-object rechecks after placement when the new block has no support.
	triggerSmallObjectScanOnPlace = true
	#启用 1-2 方块小型孤立物体补偿扫描。
	#Enable fallback scans for tiny isolated objects.
	enableSmallObjectFallback = true
	#单方块悬空组件优先使用原版 FallingBlockEntity，而不是创建 Sable 单方块物理体。
	#Use vanilla FallingBlockEntity for unsupported single-block components where possible.
	singleBlockComponentsUseFalling = true
	#原版下落方块是否压坏无碰撞且不可支撑的弱方块。雪会按原版式下落，但不会压坏树叶、藤蔓等树木弱方块。
	#Allow vanilla falling blocks to crush weak no-collision supports. Snow falls vanilla-style but does not crush tree air-like blocks.
	vanillaFallingBlocksCrushNoCollision = true
	#压坏弱支撑总开关。影响原版下落方块与静止 Sable 物理体的弱方块压坏逻辑。
	#Master switch for crushing weak no-collision supports.
	crushNoCollisionSupports = true
	#启用延迟物理化队列，降低一次性创建大量 sub-level 的同步风险。
	#Enable delayed assembly queue to reduce sub-level sync pressure.
	enableDelayedAssembly = true
	#启用本模组创建的 Sable sub-level 自动还原。锤子保存的物理体不会自动还原。
	#Auto-restore sub-levels created by this mod. Hammer-pinned sub-levels are excluded.
	enableAutoRestoreSubLevels = true
	#启用网格嵌入快速还原。物理体基本回到方块网格后可提前还原。
	#Enable fast restore for sub-levels that settle back into the block grid.
	enableGridAlignedFastRestore = true
	#静止 Sable 物理体是否压坏重叠的无碰撞弱方块并登记禁放区。
	#Allow stationary Sable sub-levels to crush overlapped weak no-collision blocks and reserve occupied cells.
	enableSubLevelCrushNoCollisionBlocks = true
	#监听爆炸导致的方块破坏。
	#Listen for explosion block destruction.
	enableExplosionEvents = true
	#监听活塞推动/拉回导致的方块移动。
	#Listen for piston movement.
	enablePistonEvents = true
	#监听生物破坏方块事件。
	#Listen for living entity block destruction.
	enableLivingDestroyBlockEvents = true
	#追踪末影人拿起/放下方块。
	#Track Enderman carried block changes.
	enableEndermanCarryTracking = true
	#监听原版下落方块实体生成。
	#Listen for vanilla falling block entities.
	enableFallingBlockEvents = true
	#监听流体造块事件。
	#Listen for fluid block placement events.
	enableFluidPlaceBlockEvents = true
	#监听耕地被踩坏事件。
	#Listen for farmland trample events.
	enableFarmlandTrampleEvents = true
	#监听斧头去皮、铲子造土径、锄头耕地等工具改方块事件。
	#Listen for tool block-state modification events.
	enableToolModificationEvents = true
	#邻居物理更新兜底。事件频率很高，默认关闭。
	#Fallback neighbor update listener. Very noisy; off by default.
	enableNeighborPhysicsEvents = false
	#输出调试日志。性能排查时再打开。
	#Enable debug logging.
	logDebug = false
	#输出超过 slowScanLogMillis 的慢扫描日志。
	#Log scans slower than slowScanLogMillis.
	logSlowScans = true

#基本数值：常规玩家可按性能和玩法调节。
#Basic values: safe gameplay/performance tuning.
[basic_values]
	#方块变化后延迟多少 tick 再扫描。建议至少 1。
	#Ticks to wait before scanning after a block change. At least 1 is recommended.
	# Default: 1
	# Range: 0 ~ 200
	delayTicks = 1
	#自动触发时，从变化中心寻找候选起点的半径。
	#Radius used to find candidate origins around an automatic trigger.
	# Default: 2
	# Range: 1 ~ 32
	triggerRadius = 2
	#单次连通搜索最大扩展半径。越大越容易识别大型物体，但越吃性能。
	#Maximum component expansion radius. Larger values catch larger objects but cost more.
	# Default: 12
	# Range: 4 ~ 128
	maxExpansionRadius = 12
	#单个物理体最多包含多少方块。
	#Maximum blocks per assembled object.
	# Default: 512
	# Range: 1 ~ 256000
	maxBlocksPerAssembly = 512
	#低于该方块数的连通结构不自动物理化。
	#Components smaller than this are not assembled.
	# Default: 1
	# Range: 1 ~ 256000
	minBlocksPerAssembly = 1
	#每个扫描任务最多尝试多少个候选起点。
	#Maximum candidate origins tested per scan.
	# Default: 12
	# Range: 1 ~ 8192
	maxOriginsPerScan = 12
	#每个维度每 tick 最多处理多少个扫描任务。
	#Maximum scan jobs processed per dimension per tick.
	# Default: 1
	# Range: 1 ~ 256
	maxJobsPerLevelTick = 1
	#同一方块位置重复入队的冷却 tick。
	#Cooldown before the same position may enqueue another scan.
	# Default: 20
	# Range: 0 ~ 1200
	samePositionCooldownTicks = 20
	#砍树时，每个树干周围追加标记 affected 的半径。
	#Affected radius added around each trunk during tree cutting.
	# Default: 5
	# Range: 0 ~ 32
	treeAffectedRadius = 5
	#树干失去支撑后，强制带入树叶的半径。
	#Leaf radius force-included when a trunk becomes unsupported.
	# Default: 3
	# Range: 0 ~ 32
	treeLeafAssemblyRadius = 3
	#单次砍树 BFS 最多收集多少个树干方块。
	#Maximum connected trunk blocks collected per tree BFS.
	# Default: 1024
	# Range: 1 ~ 65536
	maxConnectedTreeTrunksPerScan = 1024
	#一次砍树强制物理化最多允许包含多少树干/树叶方块。
	#Maximum trunk/leaf blocks in one forced tree assembly.
	# Default: 4096
	# Range: 1 ~ 262144
	maxTreeBlocksPerAssembly = 4096
	#同一维度两次创建 Sable sub-level 的最小间隔。
	#Minimum ticks between sub-level assemblies in the same dimension.
	# Default: 8
	# Range: 0 ~ 1200
	minTicksBetweenAssemblies = 8
	#延迟队列每个维度每 tick 最多真正创建多少个 sub-level。建议保持 1。
	#Maximum sub-levels actually assembled per dimension per tick. Keep at 1 unless tested.
	# Default: 1
	# Range: 1 ~ 32
	maxAssembliesPerLevelTick = 1
	#自动还原位置检测间隔。默认约 30 秒。
	#Position check interval for auto restore. Default is about 30 seconds.
	# Default: 600
	# Range: 20 ~ 72000
	restorePositionCheckIntervalTicks = 600
	#物理体累计多久未移动后自动还原。默认约 5 分钟。
	#Idle ticks required before auto restore. Default is about 5 minutes.
	# Default: 6000
	# Range: 20 ~ 720000
	restoreIdleTicksRequired = 6000
	#自动还原最多处理多少方块的物理体。
	#Maximum block count eligible for auto restore.
	# Default: 512
	# Range: 1 ~ 256000
	maxBlocksForAutoRestore = 512
	#删除掉入虚空深处的本模组下落方块和 Sable 物理体，避免无限下落。
	#Delete this mod's falling blocks and Sable sub-levels after they fall below the void cleanup height.
	enableVoidCleanup = true
	#默认虚空删除高度 = 当前维度最小构建高度减去该值。64 对齐原版玩家虚空伤害高度：主世界 -128，下界/末地 -64。
	#Default void cleanup Y = dimension minimum build height minus this value. 64 matches vanilla player void damage height: overworld -128, nether/end -64.
	# Default: 64
	# Range: 0 ~ 4096
	voidDeleteOffsetBelowMinBuildHeight = 64
	#自定义维度虚空删除高度，格式为 dimension_id=y，例如 minecraft:overworld=-128。用于适配模组维度。
	#Custom per-dimension void cleanup heights, in dimension_id=y form, for example minecraft:overworld=-128. Use this for modded dimensions.
	voidDeleteHeightOverrides = []
	#扫描耗时超过多少毫秒时输出警告日志。
	#Log a warning when a scan takes longer than this many milliseconds.
	# Default: 50
	# Range: 1 ~ 10000
	slowScanLogMillis = 50

#高级设置：一般不需要改动，主要用于整合包调参、兼容和故障排查。
#Advanced settings: mostly for pack tuning, compatibility, and diagnostics.
[advanced]
	#手动 /autosablephysics scan_here 默认半径。
	#Default radius for manual /autosablephysics scan_here.
	# Default: 4
	# Range: 1 ~ 64
	manualScanRadius = 4
	#受影响状态自动扫描使用的最小结构方块数上限。
	#Minimum component size cap for affected-state automatic scans.
	# Default: 1
	# Range: 1 ~ 256000
	autoAffectedMinBlocksPerAssembly = 1
	#自动队列每维度每 tick 安全任务上限，用于覆盖旧配置中的过大值。
	#Safety cap for automatic scan jobs per dimension per tick.
	# Default: 1
	# Range: 1 ~ 256
	autoMaxJobsPerLevelTick = 1
	#自动触发扫描安全半径上限。
	#Safety cap for automatic trigger radius.
	# Default: 2
	# Range: 1 ~ 32
	autoMaxTriggerRadius = 2
	#自动触发扫描连通扩展安全上限。
	#Safety cap for automatic expansion radius.
	# Default: 12
	# Range: 4 ~ 128
	autoMaxExpansionRadius = 12
	#自动触发扫描单结构方块数安全上限。
	#Safety cap for automatic blocks per assembly.
	# Default: 512
	# Range: 1 ~ 256000
	autoMaxBlocksPerAssembly = 512
	#自动触发扫描候选起点安全上限。
	#Safety cap for automatic candidate origins.
	# Default: 12
	# Range: 1 ~ 8192
	autoMaxOriginsPerScan = 12
	#候选起点必须至少贴着一个空气方块。
	#Candidate origins must touch air.
	requireStartNearAir = true
	#候选起点底部或自身 canSurvive 依赖仍有外部支撑时跳过。
	#Skip candidate origins that still have bottom support or external canSurvive anchors.
	requireStartWithoutBottomSupport = true
	#过大/触边候选附近跳过其它候选的半径。
	#Radius used to suppress nearby candidates after a too-large/boundary rejection.
	# Default: 5
	# Range: 0 ~ 32
	tooLargeRejectRadius = 5
	#破坏方块后，对直接邻位放宽起点底部支撑预过滤。
	#Relax start bottom-support precheck for direct neighbors of a broken block.
	relaxStartSupportForDirectBreakNeighbors = true
	#每次破坏最多多少个直接邻位使用放宽起点过滤。
	#Maximum direct break neighbors allowed to bypass the start support precheck.
	# Default: 6
	# Range: 0 ~ 6
	maxRelaxedBreakNeighborOrigins = 6
	#自动扫描只允许面接触连接，避免边角斜连误判。
	#Require face contact for automatic component connection.
	requireFaceContactForAutoAssembly = true
	#无碰撞方块默认不能提供底部支撑。
	#No-collision blocks cannot provide bottom support by default.
	noCollisionBlocksCannotSupport = true
	#只有完整碰撞方块才默认提供支撑。默认关闭。
	#Require full collision blocks for default support. Off by default.
	requireFullCollisionBlockForSupport = false
	#无碰撞方块默认不参与组件连接；no_collision_connecting 标签可覆盖。
	#No-collision blocks do not connect by default; no_collision_connecting can override.
	noCollisionBlocksDoNotConnect = true
	#尊重方块自身 canSurvive 支撑规则。梯子、墙上告示牌、发光地衣、按钮等依赖侧面/顶部/同类链式支撑的方块，会把这些依赖视为外部支撑，避免单独被物理化成掉落物。
	#Respect each block's own canSurvive support rules. Ladders, wall signs, glow lichen, buttons, and similar side/top/chain-supported blocks treat their vanilla survival anchors as external support instead of falling alone.
	respectBlockSurvivalSupport = true
	#只有整个连通结构没有外部底部支撑和 canSurvive 依赖支撑时才物理化。
	#Only assemble components without external bottom support or canSurvive anchor support.
	requireNoExternalBottomSupport = true
	#组件触碰搜索边界时跳过，避免截取大型结构的一部分。
	#Skip components that touch the search boundary.
	skipIfTouchesSearchBoundary = true
	#允许自动移动含 BlockEntity 的方块。整合包中建议谨慎测试。
	#Allow automatic movement of blocks with block entities. Test carefully in modpacks.
	allowBlockEntities = true
	#小型物体补偿扫描的最大方块数。
	#Maximum block count for small-object fallback scans.
	# Default: 2
	# Range: 1 ~ 64
	smallObjectMaxBlocks = 2
	#小型物体补偿扫描半径。
	#Radius for small-object fallback scans.
	# Default: 2
	# Range: 0 ~ 16
	smallObjectScanRadius = 2
	#小型物体补偿扫描最多尝试的候选起点数。
	#Maximum candidate origins for small-object fallback scans.
	# Default: 48
	# Range: 1 ~ 1024
	maxSmallObjectOriginsPerScan = 48
	#忽略 Sable plot/sub-level 内部事件，避免已物理化物体再次触发扫描。
	#Ignore events inside Sable plots/sub-levels.
	ignoreEventsInsideSableSubLevels = true
	#启用 affected SavedData 状态系统。建议保持开启。
	#Enable the affected SavedData state system. Keep enabled.
	useAffectedBlockState = true
	#破坏方块时标记 affected 的半径。
	#Affected radius for block breaks.
	# Default: 2
	# Range: 0 ~ 16
	affectedRadiusOnBreak = 2
	#放置方块时标记 affected 的半径。
	#Affected radius for block placement.
	# Default: 1
	# Range: 0 ~ 16
	affectedRadiusOnPlace = 1
	#受影响区域边界向上/向下延伸的高度。
	#Vertical extension range from affected-region boundaries.
	# Default: 15
	# Range: 0 ~ 128
	affectedBoundaryVerticalRange = 15
	#单次扫描最多读取多少个相连 affected 坐标。
	#Maximum connected affected positions read per scan.
	# Default: 8192
	# Range: 1 ~ 262144
	maxAffectedRegionBlocksPerScan = 8192
	#单次扫描最多处理多少个 affected 边界列。
	#Maximum affected boundary columns per scan.
	# Default: 512
	# Range: 1 ~ 65536
	maxAffectedBoundaryColumnsPerScan = 512
	#单次自动扫描最多准备多少个候选起点。
	#Maximum prepared candidate origins per automatic scan.
	# Default: 2048
	# Range: 1 ~ 262144
	maxPreparedCandidatesPerScan = 2048
	#异步准备 affected 候选。异步线程只处理坐标集合，不读写世界。
	#Prepare affected candidates asynchronously; worker threads only process coordinates.
	asyncPrepareAffectedCandidates = true
	#单次爆炸最多标记多少个 affected 方块。
	#Maximum affected blocks marked for one explosion.
	# Default: 256
	# Range: 1 ~ 8192
	maxExplosionBlocksToMark = 256
	#单次活塞事件最多标记多少个相关方块。
	#Maximum marked positions for one piston event.
	# Default: 32
	# Range: 1 ~ 512
	maxPistonBlocksToMark = 32
	#邻居物理更新兜底每个维度每 tick 最多处理多少个中心。
	#Maximum neighbor update centers processed per dimension per tick.
	# Default: 8
	# Range: 1 ~ 256
	maxNeighborEventsPerTick = 8
	#要求上一个 sub-level 被玩家 tracking 后才创建下一个。
	#Require the previous sub-level to be tracked by players before creating the next one.
	requireSableTrackingConfirmation = true
	#即使已 tracking，也至少等待多少 tick 再创建下一个 sub-level。
	#Minimum ticks to wait after tracking before creating another sub-level.
	# Default: 10
	# Range: 0 ~ 1200
	minSableSyncWaitTicks = 10
	#待物理化队列最老任务等待超过多少 tick 后提示玩家。
	#Warn players when the oldest pending assembly exceeds this age.
	# Default: 200
	# Range: 0 ~ 72000
	pendingAssemblyWarningTicks = 200
	#待物理化队列长度达到多少时提示玩家。
	#Warn players when pending queue size reaches this value.
	# Default: 8
	# Range: 0 ~ 4096
	pendingAssemblyWarningSize = 8
	#队列警告最小间隔 tick。
	#Minimum interval between pending queue warnings.
	# Default: 200
	# Range: 20 ~ 72000
	pendingAssemblyWarningIntervalTicks = 200
	#启用物理化队列阻塞检测。若 Sable tracking gate 长时间不放行，会自动清除旧 gate 恢复队列。
	#Enable pending queue watchdog. It clears stale Sable tracking gates when the queue is blocked for too long.
	enablePendingQueueWatchdog = true
	#队列最老任务等待超过多少 tick 后触发阻塞恢复。默认约 30 秒。
	#Oldest pending age that triggers queue recovery. Default is about 30 seconds.
	# Default: 600
	# Range: 20 ~ 72000
	pendingQueueWatchdogTicks = 600
	#待装配任务因区块未加载等原因 WAIT 超过该 tick 后丢弃；0 表示不丢弃。
	#Drop a pending assembly stuck in WAIT after this many ticks; 0 disables dropping.
	# Default: 1200
	# Range: 0 ~ 72000
	stalePendingCancelTicks = 1200
	#排队期间如果组件重新连接到外部可移动方块，则取消本次物理化。
	#Cancel a pending assembly if it reconnects to external movable blocks.
	cancelPendingIfConnected = true
	#排队期间如果组件重新获得外部底部支撑，则取消本次物理化。
	#Cancel a pending assembly if it regains external bottom support.
	cancelPendingIfSupported = true
	#非玩家事件额外稳定等待 tick。
	#Extra stabilization delay for non-player block-change events.
	# Default: 5
	# Range: 0 ~ 200
	nonPlayerEventStabilizationDelayTicks = 5
	#记录本模组创建的 sub-level 运动状态。用于门控、压坏和还原。
	#Track motion of sub-levels created by this mod for gates, crush checks, and restore.
	trackCreatedSubLevelMotion = true
	#静止判断线速度阈值。
	#Linear velocity threshold for stationary checks.
	# Default: 0.015
	# Range: 0.0 ~ 10.0
	restoreLinearSpeedThreshold = 0.015
	#静止判断角速度阈值。
	#Angular velocity threshold for stationary checks.
	# Default: 0.015
	# Range: 0.0 ~ 10.0
	restoreAngularSpeedThreshold = 0.015
	#两次检测之间小于该距离视为位置不变。
	#Position delta below this value is treated as unchanged.
	# Default: 0.025
	# Range: 0.0 ~ 2.0
	restorePositionEpsilon = 0.025
	#还原时近似坐标被占用后，在周围寻找替代空位的半径。
	#Radius for finding alternate restore positions when the ideal cell is occupied.
	# Default: 2
	# Range: 0 ~ 16
	restoreCollisionSearchRadius = 2
	#网格嵌入快速还原要求的未移动 tick。
	#Idle ticks required for grid-aligned fast restore.
	# Default: 600
	# Range: 20 ~ 72000
	gridAlignedRestoreIdleTicks = 600
	#判断物理体是否贴合方块网格时允许的坐标偏差。
	#Position tolerance for grid-alignment checks.
	# Default: 0.0625
	# Range: 0.0 ~ 0.5
	gridAlignmentEpsilon = 0.0625
	#网格嵌入快速还原允许的旋转角偏差，单位弧度。
	#Angular tolerance for grid-aligned fast restore, in radians.
	# Default: 0.05
	# Range: 0.0 ~ 3.14159
	gridAlignmentAngularEpsilon = 0.05
	#静止 sub-level 压坏检测间隔。
	#Stationary sub-level crush check interval.
	# Default: 20
	# Range: 1 ~ 1200
	subLevelCrushCheckIntervalTicks = 20
	#sub-level 连续静止多少 tick 后允许执行一次压坏扫描。
	#Idle ticks required before a sub-level may run one crush scan.
	# Default: 40
	# Range: 1 ~ 72000
	stationarySubLevelCrushIdleTicks = 40
	#只扫描距离玩家该半径内的 sub-level。
	#Only check sub-levels within this radius of a player.
	# Default: 64
	# Range: 1 ~ 512
	subLevelCrushPlayerRadius = 64
	#单个 sub-level 每次压坏检测最多检查多少普通世界方块。
	#Maximum world blocks checked per sub-level crush scan.
	# Default: 4096
	# Range: 1 ~ 262144
	subLevelCrushMaxBlocksPerCheck = 4096
	#压坏检测时对 sub-level 全局 AABB 额外扩张多少格。
	#Extra expansion applied to the sub-level global AABB for crush checks.
	# Default: 0.0625
	# Range: 0.0 ~ 1.0
	subLevelCrushAabbExpansion = 0.0625
