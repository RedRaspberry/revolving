[common]
	#Fixes vanilla Create behavior where, if track is placed strange enough, curve, train, signal overlay goes brurr. Enabling this option on existing world might break your existing world, as every curve is affected. Position of track, edge points (station, signals) could change.
	fix_track_bezier_asymmetry = true
	#Fix vanilla Create glitch where, track segments are generated wrong, so track rendering and edge points (station, signal, ...) are located on wrong place. Enabling this option on existing world might break your existing world, as these edge points are moved.
	fix_track_bezier_glitch = true
	#Originally created to fix his own world by developer. Do not enable unless required.
	fix_broken_graphs = false

	[common.manual_station]
		#Makes approaching to station manual. Cannot use space to approach station, and when train approached station enough, press space to mark train to be arrived at station.
		enabled = false
		#Specify maximum distance between which train can arrive at station.
		# Default: 0.5
		# Range: 0.0 ~ 10.0
		distance_limit = 0.5
		#Specify maximum distance between which train can disassemble.
		# Default: 0.2
		# Range: 0.0 ~ 0.5
		disassemble_limit = 0.2

	[common.fake_tracks]
		#Overrides tick rate how often fake tracks are updated. Set to 0 to use default value in create, which is 100 ticks.
		# Default: 0
		# Range: > 0
		update_tick_rate = 0
		#Does not update fake tracks when additional chunk loading is required. This would reduce lag for long curves, but some fake tracks would be able to placed.
		disable_for_unloaded_chunk = false
		#Enables optimized fake tracks caching. Does not dramatically improve performance. Required for middleTrack.
		optimize = true
		#Disables placing fake tracks entirely, except for middle tracks if configured. Fake tracks are placed every 5 seconds (100 ticks), and placing them requires all chunks spanning curve to be loaded. This becomes enormous burden for long curves. railx already optimizes fake track placement, but this make it better. If good integration for your map mod exists then you will not need it in most cases.
		no_fake_tracks = false

[carriage_metadata]
	#Allows carriage to have custom metadata.
	enabled = true
	#Max size of all metadata stored for carriage, in bytes.
	# Default: 512
	# Range: > 0
	entry_max_size = 512

[realistic_speed]
	#Enables trains to have realistic speed
	enabled = false
	#Removes previously saved realistic speed-related parameters/caches from train data.
	remove_previous = false
	#Calculates carriage mass based on its shape and material. If you want to specify mass for yourspecific blocks, create datapack at railx.realistic_speed/materials, or implementBlockMaterialResolver and adding into AllCustoms.Registry.
	precise_mass = true
	#Amount of force power cars exert in kW. This replaces acceleration property of Create.
	# Default: 800.0
	# Range: 0.0 ~ Infinity
	power = 800.0
	#How often physical values, such as mass, gravitational force, etc. are calculated
	# Default: 3
	# Range: > 1
	update_tick_rate = 3
	#Define acceleration multiplier of brake. Proportional to Create train acceleration.
	# Default: 1.5
	# Range: 0.0 ~ 100.0
	brake_acceleration = 1.5
	#Applies brake automatically if train is at train station.
	brake_at_station = true
	#Rolling resistance multiplier; how much trains are decelerated naturally by friction between bogey, axles and rail. Does not affect starting resistance.
	# Default: 1.0
	# Range: 0.0 ~ Infinity
	passive_deceleration = 1.0
	#Starting rolling resistance per block
	# Default: 0.03
	# Range: 0.0 ~ 1.0
	starting_resistance = 0.03
	#How trains are accelerated according to gradient; works as gravitational constant
	# Default: 0.1
	# Range: 0.0 ~ 100.0
	gradient_acceleration = 0.1
	#Factor for curvature resistance of train. 1 for default; 0 to disable.
	# Default: 1.0
	# Range: 0.0 ~ 100.0
	curvature_resistance = 1.0
	#Whether to enable air resistance
	air_resistance_enabled = true

	[realistic_speed.slip]
		#Whether train slips where there are not sufficient adhesion(friction) between wheels and track.
		enabled = false
		#The coefficient of friction. The larger, the less it slips.
		# Default: 0.5
		# Range: 0.0 ~ Infinity
		coefficient = 0.5

[throttle]
	#Enables throttle control, which is similar to real-life master controller.
	enabled = false
	#Sets multiplier of emergency break. Actual braking is determined by (breaking power of B7) * multiplier. Set to 1 to disable emergency brake.
	# Default: 1.0
	# Range: 1.0 ~ Infinity
	emergency_brake_multiplier = 1.0

[middle_track]
	#Whether to enable rendering tracks for out-of-chunk end node.
	enabled = true
	#Whether to enable placing fake middle track. All curves, only with this optionenabled, are rendered even with out-of-chunk end node.
	enable_placing = false
	#Removes all previous middle tracks.
	remove_previous = false
	#The gap, in chunk, at which fake middle track is placed. If larger than render distance, does not take effect.
	# Default: 4
	# Range: 1 ~ 16
	place_gap = 4
	#Whether to show outline, relocate train, etc. for curves with out-of-chunk end node. Some features like breaking curve are still restricted.
	enable_interaction = true

[flexi_trak]
	#You can create train track block with any angle you want.
	enabled = true
	#How long track can placed.
	# Default: 128
	# Range: 1 ~ 2048
	placement_length = 128
	#Minimum radius at which flexi tracks can be placed.
	# Default: 32
	# Range: 5 ~ 1000
	min_radius = 32
	#Maximum gradient of flexi tracks. Defined as per mille (‰); 1 means ascending 1 meter while travelling 1000 meter.
	# Default: 80.0
	# Range: 0.0 ~ 10000.0
	max_gradient = 80.0

[build_trak]
	#Whether to enable tools for building tracks. This also enables placing tracks longer than maximum track length limit.
	enabled = true
	#Maximum placement length for each curve.
	# Default: 1024
	# Range: 0 ~ 25565
	max_placement_length = 1024
